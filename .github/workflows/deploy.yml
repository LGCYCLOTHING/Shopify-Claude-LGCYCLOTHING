name: Deploy to Shopify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy theme to Shopify
        env:
          SHOPIFY_FLAG_STORE: 0dc7p1-tw.myshopify.com
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_API_KEY }}
        run: |
          shopify theme push \
            --store 0dc7p1-tw.myshopify.com \
            --theme 142745305274 \
            --allow-live \
            --nodelete \
            --ignore "templates/*.json" \
            --ignore "config/settings_data.json" \
            --ignore "sections/*-group.json"
